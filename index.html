<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Árvore Genealógica da Família</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#eef2ef;
color:#222;
}

/*========================
HERO
========================*/

.hero{

height:100vh;

background-image:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("avo.jpg");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

position:relative;

overflow:hidden;

}

.hero::after{

content:"";

position:absolute;

inset:0;

backdrop-filter:blur(6px);

}

.hero-box{

position:relative;

z-index:5;

width:min(900px,90%);

padding:55px;

text-align:center;

border-radius:30px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

box-shadow:0 20px 60px rgba(0,0,0,.4);

}

.hero h1{

font-size:60px;

color:white;

margin-bottom:20px;

}

.hero p{

font-size:22px;

color:white;

margin-bottom:40px;

line-height:1.8;

}

.botao{

display:inline-block;

padding:18px 45px;

background:#1d8c51;

color:white;

text-decoration:none;

font-size:20px;

font-weight:600;

border-radius:50px;

transition:.3s;

}

.botao:hover{

transform:translateY(-5px);

background:#16653b;

}

section{

width:min(1200px,92%);

margin:auto;

padding:80px 0;

}

.titulo{

text-align:center;

font-size:42px;

color:#1b603d;

margin-bottom:60px;

}

.galeria{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:35px;

}

.foto{

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:0 15px 35px rgba(0,0,0,.15);

transition:.4s;

}

.foto:hover{

transform:translateY(-10px);

}

.foto img{

width:100%;

height:350px;

object-fit:cover;

display:block;

}

.foto h2{

padding:25px;

text-align:center;

color:#1d8c51;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:30px;

}

.card{

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 12px 30px rgba(0,0,0,.12);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.card h3{

color:#1d8c51;

margin-bottom:18px;

}

.card p{

line-height:1.8;

}

footer{

background:#155236;

color:white;

text-align:center;

padding:40px;

margin-top:70px;

}

@media(max-width:768px){

.hero h1{

font-size:38px;

}

.hero p{

font-size:18px;

}

.hero-box{

padding:35px;

}

.titulo{

font-size:32px;

}

}

</style>

</head>

<body>

<header class="hero">

<div class="hero-box">

<h1>🌳 Árvore Genealógica da Família</h1>

<p>

Conheça a história da nossa família, preserve as lembranças e ajude a construir nossa árvore genealógica.

</p>

<a href="COLE_AQUI_SEU_LINK_DO_FAMILYSEARCH" class="botao">

Entrar na Árvore

</a>

</div>

</header>

<section>

<h1 class="titulo">

📸 Nossos Antepassados

</h1>

<div class="galeria">

<div class="foto">

<img src="file_0000000064bc720

e8d857bb463b81c76.png">

<h2>Família do meu avô</h2>

</div>

<div class="foto">

<img src="fs-180840682_20260715_145548.jpg">

<h2>Família da minha avó</h2>

</div>

</div>

</section>
